<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Gesture Particles · HUD</title>
  <meta http-equiv="Permissions-Policy" content="camera=(self)">
  <meta charset="UTF-8" />
  <style>
    /* ── Reset & Base ─────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --neon:   #00ffcc;
      --neon2:  #00aaff;
      --warn:   #ff4466;
      --ok:     #00ff88;
      --panel:  rgba(0, 8, 20, 0.72);
      --border: rgba(0, 255, 204, 0.35);
      --font:   'Courier New', monospace;
    }

    body {
      background: #000;
      overflow: hidden;
      font-family: var(--font);
      color: var(--neon);
      user-select: none;
    }

    /* ── Canvas ───────────────────────────────────────────────── */
    #canvas-container {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    /* ── Hidden video stream ──────────────────────────────────── */
    #video-el {
      position: fixed;
      top: 0; left: 0;
      width: 1px; height: 1px;
      opacity: 0;
      pointer-events: none;
      z-index: 0;
    }

    /* ── HUD Panel (top-left) ─────────────────────────────────── */
    #hud {
      position: fixed;
      top: 18px; left: 18px;
      z-index: 20;
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 18px;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      pointer-events: none;
      min-width: 210px;
    }

    #hud h3 {
      font-size: 11px;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--neon);
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .hud-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
    }

    /* Status dot */
    #cam-dot {
      width: 9px; height: 9px;
      border-radius: 50%;
      background: var(--warn);
      flex-shrink: 0;
      transition: background 0.4s, box-shadow 0.4s;
    }
    #cam-dot.active  { background: var(--ok);   box-shadow: 0 0 8px var(--ok); }
    #cam-dot.denied  { background: var(--warn);  box-shadow: 0 0 8px var(--warn); }

    .gesture-list {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .gesture-list .g-row {
      font-size: 11px;
      display: flex;
      gap: 6px;
      align-items: baseline;
    }

    .g-row .icon { font-size: 13px; }
    .g-row .lbl  { color: rgba(0,255,204,0.55); }

    .shape-badge {
      margin-top: 10px;
      padding-top: 8px;
      border-top: 1px solid var(--border);
      font-size: 11px;
      letter-spacing: 0.12em;
    }

    #shape-name {
      color: var(--neon2);
      font-weight: bold;
      letter-spacing: 0.18em;
    }

    /* ── Floating Camera Preview (top-right) ──────────────────── */
    #cam-preview {
      position: fixed;
      top: 18px; right: 18px;
      z-index: 20;
      width: 162px; height: 122px;
      border-radius: 10px;
      border: 1px solid var(--neon);
      box-shadow: 0 0 14px rgba(0,255,204,0.4), inset 0 0 6px rgba(0,255,204,0.06);
      background: rgba(0,10,20,0.85);
      overflow: hidden;
      transition: opacity 0.4s, transform 0.4s;
      opacity: 0;
      pointer-events: none; /* toggle button handles interaction */
    }

    #cam-preview.visible {
      opacity: 1;
      pointer-events: auto;
    }

    /* Mirror the video so it feels natural */
    #cam-preview video {
      width: 100%; height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      display: block;
      border-radius: 9px;
    }

    /* Corner bracket decoration */
    #cam-preview::before,
    #cam-preview::after {
      content: '';
      position: absolute;
      width: 14px; height: 14px;
      border-color: var(--neon);
      border-style: solid;
      opacity: 0.7;
      z-index: 2;
    }
    #cam-preview::before {
      top: 6px; left: 6px;
      border-width: 2px 0 0 2px;
      border-radius: 3px 0 0 0;
    }
    #cam-preview::after {
      bottom: 6px; right: 6px;
      border-width: 0 2px 2px 0;
      border-radius: 0 0 3px 0;
    }

    /* "LIVE" pill */
    #live-tag {
      position: absolute;
      top: 10px; right: 10px;
      z-index: 3;
      background: var(--warn);
      color: #fff;
      font-size: 9px;
      letter-spacing: 0.15em;
      padding: 2px 6px;
      border-radius: 4px;
      opacity: 0.85;
    }

    /* ── Toggle Button ────────────────────────────────────────── */
    #cam-toggle {
      position: fixed;
      top: 148px; right: 18px;
      z-index: 21;
      background: var(--panel);
      border: 1px solid var(--border);
      color: var(--neon);
      font-family: var(--font);
      font-size: 11px;
      letter-spacing: 0.12em;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      backdrop-filter: blur(8px);
      transition: border-color 0.2s, box-shadow 0.2s;
      display: none; /* shown once camera is active */
    }
    #cam-toggle:hover {
      border-color: var(--neon);
      box-shadow: 0 0 8px rgba(0,255,204,0.3);
    }

    /* ── Scanline overlay (purely decorative, CSS-only) ──────── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(
        0deg,
        rgba(0,255,204,0.012) 0px,
        rgba(0,255,204,0.012) 1px,
        transparent 1px,
        transparent 4px
      );
      pointer-events: none;
      z-index: 100;
    }
  </style>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

<!-- ── HUD Panel ─────────────────────────────────────────────── -->
<div id="hud">
  <h3>⬡ Gesture Control</h3>
  <div class="hud-row">
    <span id="cam-dot"></span>
    <span id="cam-text">Initializing…</span>
  </div>
  <div class="gesture-list">
    <div class="g-row"><span class="icon">🖐</span><span class="lbl">Open Hand —</span> Rotate &amp; Color</div>
    <div class="g-row"><span class="icon">🤏</span><span class="lbl">Pinch —</span> Collapse / Expand</div>
    <div class="g-row"><span class="icon">✊</span><span class="lbl">Fist (hold) —</span> Switch Shape</div>
  </div>
  <div class="shape-badge">Shape: <span id="shape-name">SPHERE</span></div>
</div>

<!-- ── Floating Camera Preview ───────────────────────────────── -->
<div id="cam-preview">
  <span id="live-tag">● LIVE</span>
  <video id="cam-mirror" autoplay playsinline muted></video>
</div>
<button id="cam-toggle">👁 Hide Cam</button>

<!-- Hidden feed used by MediaPipe (1×1 invisible) -->
<video id="video-el" autoplay playsinline muted></video>

<!-- Canvas host -->
<div id="canvas-container"></div>

<script>
/* ================================================================
   GESTURE PARTICLES · OPTIMIZED
   ================================================================ */

/* ── 0. CONSTANTS ─────────────────────────────────────────────── */
const N          = 15000;         // particle count (fixed)
const P_SIZE     = 0.08;
const LERP       = 0.05;
const WAVE_AMP   = 0.02;
const SHAPES     = ['SPHERE','HEART','SATURN','FLOWER','DNA'];
const PI2        = Math.PI * 2;

/* ── 1. SHARED STATE ──────────────────────────────────────────── */
const state = {
  handX:         0,   // mapped -1..1
  handY:         0,   // mapped -1..1
  pinch:         1.0, // scale factor
  shapeIndex:    0,
  fistTimer:     0,
  cameraActive:  false,
  previewVisible:true,
};

/* Pre-allocated typed arrays – zero GC inside animation loop */
const cur = new Float32Array(N * 3);
const tgt = new Float32Array(N * 3);

/* ── 2. THREE.JS SCENE SETUP ──────────────────────────────────── */
let scene, camera, renderer, particles, posAttr, colAttr;

function initScene() {
  const container = document.getElementById('canvas-container');

  scene    = new THREE.Scene();
  scene.fog = new THREE.FogExp2(0x000000, 0.03);

  camera   = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
  camera.position.z = 10;

  renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
  renderer.setPixelRatio(Math.min(devicePixelRatio, 2)); // cap for perf
  renderer.setSize(innerWidth, innerHeight);
  container.appendChild(renderer.domElement);

  /* BufferGeometry */
  const geo  = new THREE.BufferGeometry();
  const pos  = new Float32Array(N * 3);
  const col  = new Float32Array(N * 3);

  /* Seed starting positions */
  buildSphere(tgt);
  cur.set(tgt);
  pos.set(cur);
  col.fill(1.0); // start white

  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  geo.setAttribute('color',    new THREE.BufferAttribute(col, 3));

  posAttr = geo.attributes.position;
  colAttr = geo.attributes.color;

  const sprite = new THREE.TextureLoader()
    .load('https://threejs.org/examples/textures/sprites/disc.png');

  const mat = new THREE.PointsMaterial({
    size:         P_SIZE,
    map:          sprite,
    vertexColors: true,
    blending:     THREE.AdditiveBlending,
    depthTest:    false,
    transparent:  true,
    opacity:      0.85,
  });

  particles = new THREE.Points(geo, mat);
  scene.add(particles);
}

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

/* ── 3. SHAPE GENERATORS ──────────────────────────────────────── */
/* All generators write directly into the shared `tgt` Float32Array */

function buildSphere(out) {
  const R = 4;
  for (let i = 0; i < N; i++) {
    const phi   = Math.acos(Math.random() * 2 - 1);
    const theta = Math.random() * PI2;
    const sp    = Math.sin(phi);
    const i3    = i * 3;
    out[i3]     = R * sp * Math.cos(theta);
    out[i3 + 1] = R * sp * Math.sin(theta);
    out[i3 + 2] = R * Math.cos(phi);
  }
}

function buildHeart(out) {
  for (let i = 0; i < N; i++) {
    const t  = Math.random() * PI2;
    const u  = Math.random() * Math.PI;
    const st = Math.sin(t);
    const i3 = i * 3;
    out[i3]     = (16 * st * st * st) * 0.2;
    out[i3 + 1] = (13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t)) * 0.2;
    out[i3 + 2] = 4 * Math.cos(u) * st * 0.2;
  }
}

function buildSaturn(out) {
  const split = Math.floor(N * 0.4); // 40% planet, 60% rings
  const R     = 2.5;
  const TILT  = 0.4;
  const cosT  = Math.cos(TILT);
  const sinT  = Math.sin(TILT);

  for (let i = 0; i < split; i++) {
    const phi   = Math.acos(Math.random() * 2 - 1);
    const theta = Math.random() * PI2;
    const sp    = Math.sin(phi);
    const i3    = i * 3;
    out[i3]     = R * sp * Math.cos(theta);
    out[i3 + 1] = R * sp * Math.sin(theta);
    out[i3 + 2] = R * Math.cos(phi);
  }

  for (let i = split; i < N; i++) {
    const angle = Math.random() * PI2;
    const dist  = 3.5 + Math.random() * 2.5;
    const rx    = Math.cos(angle) * dist;
    const ry    = (Math.random() - 0.5) * 0.2;
    const i3    = i * 3;
    out[i3]     = rx * cosT - ry * sinT;
    out[i3 + 1] = rx * sinT + ry * cosT;
    out[i3 + 2] = Math.sin(angle) * dist;
  }
}

function buildFlower(out) {
  const K = 5; // petals
  for (let i = 0; i < N; i++) {
    const u  = Math.random() * PI2;
    const v  = Math.random() * Math.PI;
    const r  = 3 * Math.cos(K * u) + 1;
    const sv = Math.sin(v);
    const i3 = i * 3;
    out[i3]     = r * Math.cos(u) * sv;
    out[i3 + 1] = r * Math.sin(u) * sv;
    out[i3 + 2] = r * Math.cos(v) * 0.5;
  }
}

function buildDNA(out) {
  const invN   = 1 / N;
  const hRange = 10;
  const R      = 2;
  for (let i = 0; i < N; i++) {
    const t      = i * invN * 20 * Math.PI;
    const strand = (i & 1) ? Math.PI : 0;
    const i3     = i * 3;
    out[i3]     = R * Math.cos(t + strand);
    out[i3 + 1] = i * invN * hRange - hRange * 0.5;
    out[i3 + 2] = R * Math.sin(t + strand);
  }
}

const BUILDERS = { SPHERE: buildSphere, HEART: buildHeart, SATURN: buildSaturn, FLOWER: buildFlower, DNA: buildDNA };

function switchShape(idx) {
  const name = SHAPES[idx % SHAPES.length];
  BUILDERS[name](tgt);
  document.getElementById('shape-name').textContent = name;
}

/* ── 4. ANIMATION LOOP ────────────────────────────────────────── */
/* All hot-path variables declared OUTSIDE the loop to avoid GC   */
let _t = 0, _i = 0, _i3 = 0;
let _cx = 0, _cy = 0, _cz = 0;
let _px = 0, _py = 0, _pz = 0;
let _r  = 0, _g  = 0;
let _pinch = 0;
let _sinT  = 0, _cosT  = 0;
let posArr, colArr;

function animate() {
  requestAnimationFrame(animate);

  _t     = Date.now() * 0.001;
  _pinch = state.pinch;
  posArr = posAttr.array;
  colArr = colAttr.array;

  /* Precompute per-frame constants outside particle loop */
  const hx05 = state.handX * 0.5;
  const hy05 = state.handY * 0.5;

  for (_i = 0; _i < N; _i++) {
    _i3 = _i * 3;

    /* 1. Morph: lerp toward target */
    cur[_i3]     += (tgt[_i3]     - cur[_i3])     * LERP;
    cur[_i3 + 1] += (tgt[_i3 + 1] - cur[_i3 + 1]) * LERP;
    cur[_i3 + 2] += (tgt[_i3 + 2] - cur[_i3 + 2]) * LERP;

    /* 2. Apply pinch scale */
    _cx = cur[_i3]     * _pinch;
    _cy = cur[_i3 + 1] * _pinch;
    _cz = cur[_i3 + 2] * _pinch;

    /* 3. Micro-wave (alive feeling) */
    _px = _cx + Math.sin(_t + _cx) * WAVE_AMP;
    _py = _cy + Math.cos(_t + _cy) * WAVE_AMP;

    posArr[_i3]     = _px;
    posArr[_i3 + 1] = _py;
    posArr[_i3 + 2] = _cz;

    /* 4. Dynamic color */
    _r = 0.5 + Math.sin(_t + _px * 0.5) * 0.5 + hx05;
    _g = 0.5 + Math.cos(_t + _py * 0.5) * 0.5 + hy05;

    colArr[_i3]     = _r < 0 ? 0 : _r > 1 ? 1 : _r;
    colArr[_i3 + 1] = _g < 0 ? 0 : _g > 1 ? 1 : _g;
    colArr[_i3 + 2] = 0.8; // blue base
  }

  posAttr.needsUpdate = true;
  colAttr.needsUpdate = true;

  /* Global rotation driven by hand position */
  particles.rotation.y += 0.002 + state.handX * 0.05;
  particles.rotation.x += state.handY * 0.05;

  renderer.render(scene, camera);
}

/* ── 5. MEDIAPIPE GESTURE PROCESSOR ──────────────────────────── */
const videoEl = document.getElementById('video-el');

/* Reuse the same stream for the preview mirror */
const camMirror = document.getElementById('cam-mirror');

function onHandResults(results) {
  /* Camera just became active */
  if (!state.cameraActive) {
    state.cameraActive = true;
    setStatus('active');
  }

  if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) return;

  const lm = results.multiHandLandmarks[0];

  /* Index finger tip (8) → hand XY */
  const tip   = lm[8];
  const thumb = lm[4];

  state.handX = (tip.x - 0.5) * 2;
  state.handY = -(tip.y - 0.5) * 2;

  /* Pinch: distance thumb→index */
  const dx = tip.x - thumb.x;
  const dy = tip.y - thumb.y;
  const dist = Math.sqrt(dx*dx + dy*dy);
  // map 0.02..0.2 → 0.2..1.5, clamped
  let p = (dist - 0.02) / (0.2 - 0.02) * (1.5 - 0.2) + 0.2;
  state.pinch = p < 0.1 ? 0.1 : p > 2.0 ? 2.0 : p;

  /* Fist: fingertips below PIP joints (Y increases downward) */
  const fist = lm[8].y  > lm[6].y  &&
               lm[12].y > lm[10].y &&
               lm[16].y > lm[14].y &&
               lm[20].y > lm[18].y;

  if (fist) {
    state.fistTimer++;
    if (state.fistTimer > 30) {
      state.shapeIndex++;
      switchShape(state.shapeIndex);
      state.fistTimer = 0;
    }
  } else {
    state.fistTimer = 0;
  }
}

/* ── 6. MEDIAPIPE + CAMERA INIT ───────────────────────────────── */
const hands = new Hands({
  locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});

hands.setOptions({
  maxNumHands:          1,
  modelComplexity:      1,
  minDetectionConfidence: 0.5,
  minTrackingConfidence:  0.5,
});

hands.onResults(onHandResults);

const mpCamera = new Camera(videoEl, {
  onFrame: async () => {
    await hands.send({ image: videoEl });
  },
  width: 640,
  height: 480,
});

mpCamera.start().then(() => {
  /* Once stream is running, pipe it to the preview mirror */
  if (videoEl.srcObject) {
    camMirror.srcObject = videoEl.srcObject;
    showPreview(true);
    document.getElementById('cam-toggle').style.display = 'block';
  }
}).catch(() => {
  setStatus('denied');
});

/* ── 7. UI HELPERS ────────────────────────────────────────────── */
const camDot  = document.getElementById('cam-dot');
const camText = document.getElementById('cam-text');

const STATUS_MSGS = {
  init:   { cls: '',       text: 'Initializing…'    },
  active: { cls: 'active', text: 'Active'            },
  denied: { cls: 'denied', text: 'Permission Denied' },
};

function setStatus(key) {
  const s = STATUS_MSGS[key];
  camDot.className  = s.cls;
  camText.textContent = s.text;
}

function showPreview(visible) {
  const el = document.getElementById('cam-preview');
  state.previewVisible = visible;
  el.classList.toggle('visible', visible);
  document.getElementById('cam-toggle').textContent = visible ? '👁 Hide Cam' : '👁 Show Cam';
}

document.getElementById('cam-toggle').addEventListener('click', () => {
  showPreview(!state.previewVisible);
});

/* ── 8. BOOT ──────────────────────────────────────────────────── */
initScene();
switchShape(0);
animate();
</script>
</body>
</html>
